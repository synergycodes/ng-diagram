name: Sync SEO files

# On every docs release, build the docs, merge their SEO files (sitemap.xml,
# robots.txt, llms.txt, llms-full.txt) with the manually maintained main-site
# (Webflow) source from synergycodes/seo-ngdiagram, and push the merged output
# back to that repo's dist/ folder. The VM/proxy deployment pulls from there
# (separate task).

on:
  push:
    branches: ['release']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-seo:
    runs-on: ubuntu-latest
    name: Build, merge & push SEO files
    steps:
      - name: Checkout ng-diagram
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Build docs
        run: pnpm run docs:build

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SEO_DEPLOY_KEY }}

      - name: Clone seo-ngdiagram
        run: git clone git@github.com:synergycodes/seo-ngdiagram.git tmp/seo-repo

      - name: Merge SEO files
        run: |
          node apps/docs/scripts/merge-seo.js \
            --docs-dist apps/docs/dist \
            --src tmp/seo-repo \
            --out tmp/seo-repo/dist

      - name: Commit & push merged files
        working-directory: tmp/seo-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "No SEO changes to publish."
          else
            git commit -m "chore: sync merged SEO files from ng-diagram@${GITHUB_SHA:0:7}"
            git push
          fi
