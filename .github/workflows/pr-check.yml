name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Check code with ESLint
        run: pnpm run lint:check

      - name: Check code with Prettier
        run: pnpm run format:check

      - name: Build packages
        run: pnpm run build

      - name: Check types
        run: pnpm run check-types

      - name: Run unit tests
        run: pnpm run test

      - name: Check API report
        run: pnpm run api:check

      - name: Upload API report if check failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: packages/ng-diagram/api-report/ng-diagram.api.md

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Build packages
        run: pnpm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm run e2e:install

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @ng-diagram-package/e2e exec playwright install-deps chromium

      - name: Run Playwright e2e tests
        run: pnpm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/e2e/test-results/
          retention-days: 14
