<div class="port-side-node">
  <span class="label">{{ text() }}</span>
  <span class="side-indicator">Ports: {{ portSide() }}</span>
  <button class="toggle-btn" (click)="onTogglePortSide()">
    {{ portSide() === 'bottom' ? 'Bottom → Right' : 'Right → Bottom' }}
  </button>
</div>
<ng-diagram-port id="port-left" type="both" side="left" />
<ng-diagram-port id="port-dynamic" type="both" [side]="portSide()" />
