<div>
  @if (!dynamicPortsLabelsTestMode()) {
    <button (click)="onToggleDebugModeClick()">{{ `${isDebugModeEnabled() ? 'Disable' : 'Enable'}` }} debug mode</button>
    <button (click)="onLinkCreationClick()">Start Link Creation</button>
    <button [disabled]="!isNodeSelected()" (click)="onCenterOnClick()">Center on selected node</button>
    <button [disabled]="!isNodeSelected()" (click)="onChangeNodeTypeClick()">Change Node Type</button>
    <button [disabled]="!selectedLabelledEdge()" (click)="onToggleLabelPositionClick()">
      {{ isLabelAbsolute() ? 'Label: Absolute → Relative' : 'Label: Relative → Absolute' }}
    </button>
    <button (click)="onZoomToFitClick()">Zoom to fit</button>
    <button (click)="onAsyncTransactionWithMeasurementsDemo()">Async + Measurements + Zoom</button>
    <button (click)="saveModelClick.emit()">Save to localStorage</button>
    <button (click)="loadModelClick.emit()">Load from localStorage</button>
    <button (click)="testVirtualizationClick.emit()">Test Virtualization</button>
    <button (click)="reinitializeModelClick.emit()">Reinitialize Model</button>
    <button (click)="simulateModelDownloadClick.emit()">Simulate Model Download</button>
    <button (click)="dpTestEnter.emit()">Test Dynamic Ports & Labels</button>
  }
  @if (dynamicPortsLabelsTestMode()) {
    <button (click)="dpTestExit.emit()">Exit</button>
    <button (click)="onToggleDebugModeClick()">{{ isDebugModeEnabled() ? 'Debug: ON' : 'Debug: OFF' }}</button>
    <span class="separator">|</span>
    <span class="group-label">Single-node:</span>
    <button (click)="dpTestTogglePortSides.emit()">Toggle Port Sides</button>
    <button (click)="dpTestTogglePortOrigins.emit()">Toggle Port Origins</button>
    <span class="separator">|</span>
    <span class="group-label">Batch (200):</span>
    <button (click)="dpTestBatchAddPort.emit()">Add Port</button>
    <button (click)="dpTestBatchRemovePort.emit()">Remove Port</button>
    <button (click)="dpTestBatchToggleSide.emit()">Toggle Side</button>
    <button (click)="dpTestToggleNodeType.emit()">Toggle Node Type</button>
    <span class="separator">|</span>
    <span class="group-label">Labels:</span>
    <button (click)="dpTestToggleLabelPosition.emit()">Toggle Label Position</button>
    <button (click)="dpTestBatchToggleLabel.emit()">Batch Toggle Label</button>
    <span class="separator">|</span>
    <span class="group-label">Measurement:</span>
    <button (click)="dpTestResizeAllNodes.emit()">Resize All Nodes</button>
    <button (click)="dpTestRepositionPorts.emit()">Reposition Ports (CSS)</button>
    <span class="separator">|</span>
    <button (click)="onZoomToFitClick()">Zoom to Fit</button>
  }
</div>
